name: Stale Issues

on:
  schedule:
    # Daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Artifact submissions ──────────────────────────────────────────
          # Contributors often go quiet after opening. Give them time but close eventually.
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been open for 45 days without activity. If you're still
            planning to submit this artifact or collection, leave a comment and we'll
            keep it open. Otherwise it will be closed in 14 days to keep the tracker clean.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if you pick this back up —
            the work doesn't expire, just the open issue.

          # ── Content quality reports ───────────────────────────────────────
          # These are more urgent — bad guidance should be fixed promptly.
          # Override with a shorter window for the 'content' label.
          any-of-labels: content,artifact,needs-review

          # ── Never go stale ───────────────────────────────────────────────
          # Security issues must not be silently abandoned.
          exempt-issue-labels: security,pinned,confirmed,in-progress
          exempt-pr-labels: security,in-progress

          # ── Pull requests ─────────────────────────────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been open for 30 days without activity. If it's
            still in progress, leave a comment or push an update. It will be closed
            in 14 days if there's no response.
          close-pr-message: >
            Closing due to inactivity. The branch and commits remain — reopen when ready.
