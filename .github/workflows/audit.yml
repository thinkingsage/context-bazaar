name: Security Audit

on:
  schedule:
    # Every Monday at 07:00 UTC — early enough to act on findings before the week fills up
    - cron: "0 7 * * 1"
  # Also run when dependencies change
  push:
    branches: [main]
    paths:
      - "skill-forge/package.json"
      - "skill-forge/bun.lock"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install
        working-directory: skill-forge

      - name: Run bun audit
        id: audit
        working-directory: skill-forge
        run: |
          bun audit --json > audit-results.json 2>/dev/null || true

          # Parse JSON to count high/critical vulnerabilities precisely
          TOTAL_HIGH=$(jq '[to_entries[].value[] | select(.severity == "high" or .severity == "critical")] | length' audit-results.json 2>/dev/null || echo 0)

          # Check if all high/critical vulns are from promptfoo transitive deps
          # (dev-only eval framework, never shipped in compiled binary)
          PROMPTFOO_PATHS=$(bun audit 2>&1 | grep -c "promptfoo" || true)

          if [ "$TOTAL_HIGH" -gt 0 ] && [ "$PROMPTFOO_PATHS" -ge "$TOTAL_HIGH" ]; then
            echo "high_count=0" >> "$GITHUB_OUTPUT"
            echo "::warning::Found $TOTAL_HIGH high/critical vulnerabilities in dev-only transitive deps (promptfoo). Not blocking."
          else
            ACTIONABLE=$((TOTAL_HIGH - PROMPTFOO_PATHS))
            if [ "$ACTIONABLE" -lt 0 ]; then ACTIONABLE=0; fi
            echo "high_count=$ACTIONABLE" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-results
          path: skill-forge/audit-results.json
          retention-days: 30

      - name: Fail on high or critical vulnerabilities
        if: steps.audit.outputs.high_count > 0
        run: |
          echo "::error::Found high or critical vulnerabilities. Review audit-results artifact."
          exit 1

  secret-scan:
    name: Secret scan (knowledge artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: >
            --source .
            --config .gitleaks.toml
            --redact
            --exit-code 1

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    # Only on schedule and push to main — not on every PR
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # publish_results requires the workflow to run from the repository's
          # default branch; setting it to false avoids the HTTP 400 "workflow
          # verification failed" error while still generating the SARIF report
          # for upload to the GitHub Security tab below.
          publish_results: false

      - name: Upload Scorecard results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
