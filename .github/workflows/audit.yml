name: Security Audit

on:
  schedule:
    # Every Monday at 07:00 UTC — early enough to act on findings before the week fills up
    - cron: "0 7 * * 1"
  # Also run when dependencies change
  push:
    branches: [main]
    paths:
      - "skill-forge/package.json"
      - "skill-forge/bun.lock"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
        working-directory: skill-forge

      - name: Run bun audit
        id: audit
        working-directory: skill-forge
        run: |
          bun audit --json > audit-results.json 2>&1 || true
          # Count high/critical vulnerabilities excluding known dev-dependency transitive issues
          # promptfoo (devDependency, eval-only) pulls in vulnerable transitive deps
          # that are not shipped in the compiled binary
          AUDIT_OUTPUT=$(bun audit 2>&1 || true)
          # Filter out known promptfoo transitive dep advisories
          FILTERED=$(echo "$AUDIT_OUTPUT" | grep -c "high\|critical" || true)
          KNOWN_EXCEPTIONS=$(echo "$AUDIT_OUTPUT" | grep -c "promptfoo" || true)
          # If all high/critical vulns are from promptfoo transitive deps, don't fail
          if [ "$FILTERED" -gt 0 ] && [ "$KNOWN_EXCEPTIONS" -ge "$FILTERED" ]; then
            echo "high_count=0" >> "$GITHUB_OUTPUT"
            echo "::warning::Found vulnerabilities in dev-only transitive deps (promptfoo). Not blocking release."
          else
            ACTIONABLE=$((FILTERED - KNOWN_EXCEPTIONS))
            echo "high_count=$ACTIONABLE" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-results
          path: skill-forge/audit-results.json
          retention-days: 30

      - name: Fail on high or critical vulnerabilities
        if: steps.audit.outputs.high_count > 0
        run: |
          echo "::error::Found high or critical vulnerabilities. Review audit-results artifact."
          exit 1

  secret-scan:
    name: Secret scan (knowledge artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: >
            --source .
            --config .gitleaks.toml
            --redact
            --exit-code 1

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    # Only on schedule and push to main — not on every PR
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # publish_results requires the workflow to run from the repository's
          # default branch; setting it to false avoids the HTTP 400 "workflow
          # verification failed" error while still generating the SARIF report
          # for upload to the GitHub Security tab below.
          publish_results: false

      - name: Upload Scorecard results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
