name: Security Audit

on:
  schedule:
    # Every Monday at 07:00 UTC — early enough to act on findings before the week fills up
    - cron: "0 7 * * 1"
  # Also run when dependencies change
  push:
    branches: [main]
    paths:
      - "package.json"
      - "bun.lockb"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Run bun audit
        id: audit
        run: |
          bun audit --json > audit-results.json 2>&1 || true
          # Surface high/critical vulnerabilities as a failing step
          HIGH=$(bun audit 2>&1 | grep -c "high\|critical" || true)
          echo "high_count=$HIGH" >> "$GITHUB_OUTPUT"

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-results
          path: audit-results.json
          retention-days: 30

      - name: Fail on high or critical vulnerabilities
        if: steps.audit.outputs.high_count > 0
        run: |
          echo "::error::Found high or critical vulnerabilities. Review audit-results artifact."
          exit 1

  secret-scan:
    name: Secret scan (knowledge artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: >
            --source .
            --config .gitleaks.toml
            --redact
            --exit-code 1

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    # Only on schedule and push to main — not on every PR
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
