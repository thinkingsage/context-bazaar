name: CI

on:
  pull_request:
    paths:
      - "skill-forge/knowledge/**"
      - "skill-forge/templates/**"
      - "skill-forge/evals/**"
      - "skill-forge/src/**"
      - "skill-forge/scripts/**"
  workflow_dispatch:
    inputs:
      skip-lint:
        description: "Skip lint step"
        type: boolean
        default: false
      skip-typecheck:
        description: "Skip type check step"
        type: boolean
        default: false
      skip-test:
        description: "Skip test step"
        type: boolean
        default: false
      skip-validate:
        description: "Skip artifact validation"
        type: boolean
        default: false
      skip-security:
        description: "Skip security scan"
        type: boolean
        default: false
      skip-build:
        description: "Skip build + dist check"
        type: boolean
        default: false
      skip-eval:
        description: "Skip eval job"
        type: boolean
        default: false

permissions:
  contents: read
  models: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - name: Lint
        if: ${{ !inputs.skip-lint }}
        run: bun run lint

      - name: Type check
        if: ${{ !inputs.skip-typecheck }}
        run: bun x tsc --noEmit

      - name: Test
        if: ${{ !inputs.skip-test }}
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload coverage to Codecov
        if: ${{ !inputs.skip-test }}
        uses: codecov/codecov-action@v5
        with:
          files: skill-forge/coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Validate artifacts
        if: ${{ !inputs.skip-validate }}
        run: bun run dev validate

      - name: Security scan artifacts
        if: ${{ !inputs.skip-security }}
        run: bun run dev validate --security

      - name: Build
        if: ${{ !inputs.skip-build }}
        run: bun run dev build

      - name: Export static catalog
        if: ${{ !inputs.skip-build }}
        run: bun run dev catalog export --output /tmp/web-export

      - name: Verify dist is up to date
        if: ${{ !inputs.skip-build }}
        run: git diff --exit-code -- dist/

  eval:
    runs-on: ubuntu-latest
    needs: validate-and-build
    defaults:
      run:
        working-directory: skill-forge
    if: ${{ !inputs.skip-eval }}
    env:
      OPENAI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
      OPENAI_BASE_URL: https://models.github.ai/inference
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - name: Build artifacts
        run: bun run dev build

      - name: Run evals
        run: bun run dev eval --ci --provider openai:gpt-4o --output eval-results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: skill-forge/eval-results.json
