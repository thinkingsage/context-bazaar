name: CI

on:
  pull_request:
    paths:
      - "skill-forge/knowledge/**"
      - "skill-forge/templates/**"
      - "skill-forge/evals/**"
      - "skill-forge/src/**"
      - "skill-forge/scripts/**"
      - "skill-forge/package.json"
      - "skill-forge/bun.lock"
  workflow_dispatch:
    inputs:
      skip-lint:
        description: "Skip lint step"
        type: boolean
        default: false
      skip-typecheck:
        description: "Skip type check step"
        type: boolean
        default: false
      skip-test:
        description: "Skip test step"
        type: boolean
        default: false
      skip-validate:
        description: "Skip artifact validation"
        type: boolean
        default: false
      skip-security:
        description: "Skip security scan"
        type: boolean
        default: false
      skip-build:
        description: "Skip build + dist check"
        type: boolean
        default: false
      skip-eval:
        description: "Skip eval job"
        type: boolean
        default: false

permissions:
  contents: read
  models: read

# Cancel in-progress runs for the same PR — only the latest push matters.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast checks: lint + typecheck (no test overhead) ──
  lint-and-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Lint
        if: ${{ !inputs.skip-lint }}
        run: bun run lint

      - name: Type check
        if: ${{ !inputs.skip-typecheck }}
        run: bun x tsc --noEmit

  # ── Test suite + coverage ──
  test:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-test }}
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Test
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload coverage to Codecov
        if: ${{ !inputs.skip-test }}
        uses: codecov/codecov-action@v6
        with:
          files: skill-forge/coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Validate + build + dist drift check ──
  validate-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Validate artifacts
        if: ${{ !inputs.skip-validate }}
        run: bun run dev validate

      - name: Security scan artifacts
        if: ${{ !inputs.skip-security }}
        run: bun run dev validate --security

      - name: Build
        if: ${{ !inputs.skip-build }}
        run: bun run dev build

      - name: Export static catalog
        if: ${{ !inputs.skip-build }}
        run: bun run dev catalog export --output /tmp/web-export

      - name: Verify dist is up to date
        if: ${{ !inputs.skip-build }}
        run: git diff --exit-code -- dist/

      - name: Verify MCP bridge compiles
        if: ${{ !inputs.skip-build }}
        run: |
          bun run build:bridge
          node bridge/mcp-server.cjs --version || true

  # ── Changelog fragment enforcement ──
  changelog-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changelog fragment
        run: |
          # Fetch the base branch so we can diff against it
          git fetch origin ${{ github.base_ref }} --depth=1

          # Get list of changed files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Check if any source/artifact files changed (not just docs/CI)
          SRC_CHANGED=$(echo "$CHANGED" | grep -E '^skill-forge/(src|knowledge|templates|scripts)/' || true)

          if [ -z "$SRC_CHANGED" ]; then
            echo "No source files changed — changelog fragment not required."
            exit 0
          fi

          # Check for skip-changelog label
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q "skip-changelog"; then
            echo "skip-changelog label found — skipping enforcement."
            exit 0
          fi

          # Check if a changelog fragment was added
          FRAGMENT=$(echo "$CHANGED" | grep '^skill-forge/changes/.*\.md$' || true)

          if [ -z "$FRAGMENT" ]; then
            echo "::error::Source files changed but no changelog fragment found in skill-forge/changes/."
            echo "::error::Run 'bun run changelog:new --type <added|changed|fixed|...> --message \"description\"' to create one."
            echo "::error::Or add the 'skip-changelog' label to bypass this check."
            exit 1
          fi

          echo "✓ Changelog fragment found: $FRAGMENT"

  # ── Eval (depends on validate-and-build) ──
  eval:
    runs-on: ubuntu-latest
    needs: validate-and-build
    defaults:
      run:
        working-directory: skill-forge
    if: >-
      ${{
        !inputs.skip-eval &&
        (
          github.event_name == 'workflow_dispatch' ||
          github.event.pull_request.head.repo.full_name == github.repository
        )
      }}
    env:
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Build artifacts
        run: bun run dev build

      - name: Run evals
        run: bun run dev eval --ci --output eval-results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: skill-forge/eval-results.json
