name: Deploy Catalog to GitHub Pages

on:
  push:
    branches:
      - jhu-main
    paths:
      - "skill-forge/knowledge/**"
      - "skill-forge/src/**"
      - "skill-forge/catalog.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; skip queued runs but don't cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile
        working-directory: skill-forge

      - name: Export static catalog
        run: bun run dev catalog export --output ../site
        working-directory: skill-forge

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
