name: Dist Drift Check

# Catches cases where templates or adapters change on main without a corresponding
# dist rebuild — the PR-level check only covers the PR branch, not post-merge state.
on:
  schedule:
    # Daily at 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Rebuild all artifacts
        run: bun run dev build

      - name: Check for dist drift
        id: drift
        run: |
          if git diff --exit-code -- dist/; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
            echo "✓ dist/ is up to date with source."
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            echo "::warning::dist/ has drifted from source. A rebuild is needed."
            git diff --stat -- dist/
          fi

      - name: Rebuild MCP bridge and check drift
        if: steps.drift.outputs.drifted == 'false'
        run: |
          bun run build:bridge
          if ! git diff --exit-code -- bridge/; then
            echo "::warning::bridge/mcp-server.cjs has drifted from source."
          fi
