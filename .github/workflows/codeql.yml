name: CodeQL

on:
  schedule:
    # Weekly scan — catches newly-published CVEs against existing code
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Focus on the CLI source and MCP bridge; exclude generated dist and node_modules
          paths-ignore: |
            skill-forge/dist
            skill-forge/node_modules
            skill-forge/build
          queries: +security-extended
          # Focus on source; exclude generated and dependency directories
          config: |
            paths-ignore:
              - "skill-forge/dist/**"
              - "skill-forge/node_modules/**"
              - "skill-forge/build/**"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
        working-directory: skill-forge

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
