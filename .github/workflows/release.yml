name: Release

# Trigger on version tags pushed to main
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-releases like v0.2.0-beta.1

permissions:
  contents: write # create GitHub releases
  id-token: write # npm provenance (if publishing)

jobs:
  # ── Gate: run the full CI suite against the tagged commit ──
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun x tsc --noEmit

      - name: Test
        run: bun test

      - name: Validate artifacts
        run: bun run dev validate

  # ── Compile the standalone binary for each platform ──
  build-binaries:
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: forge-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: forge-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: forge-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: forge-darwin-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install

      - name: Compile binary
        run: |
          bun build src/cli.ts --compile \
            --target=${{ matrix.target }} \
            --outfile ${{ matrix.artifact }} \
            --external playwright-core \
            --external playwright \
            --external electron \
            --external chromium-bidi

      - name: Compress binary
        run: tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: skill-forge/${{ matrix.artifact }}.tar.gz
          retention-days: 5

  # ── Compile changelog & create the GitHub Release ──
  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for changelog context

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compile changelog for this release
        run: |
          bun run changelog:compile -- \
            --version "${{ steps.version.outputs.version }}" \
            --date "$(date +%Y-%m-%d)"

      - name: Extract release notes
        id: notes
        run: |
          # Pull the section for this version out of CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to a file for the release body (handles multiline safely)
          echo "$NOTES" > release-notes.md
          echo "Release notes extracted for v${VERSION}"

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: binaries
          merge-multiple: true

      - name: Determine pre-release flag
        id: prerelease
        working-directory: .
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "flag=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: skill-forge/release-notes.md
          prerelease: ${{ steps.prerelease.outputs.flag }}
          files: binaries/*.tar.gz
          generate_release_notes: false

      # Commit the updated CHANGELOG.md back to main so the repo stays in sync
      - name: Commit changelog update
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add skill-forge/CHANGELOG.md skill-forge/changes/
          git diff --cached --quiet && echo "No changelog changes to commit" && exit 0
          git commit -m "chore: compile changelog for ${{ github.ref_name }}"
          git push origin main

  # ── Optional: publish to npm registry ──
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    # Only publish stable releases, skip pre-releases
    if: ${{ !contains(github.ref_name, '-') }}
    environment: npm # use a GitHub environment for approval gates if desired
    defaults:
      run:
        working-directory: skill-forge
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            skill-forge/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('skill-forge/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        run: bun publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
