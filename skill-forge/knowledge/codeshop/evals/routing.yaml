# Eval: Skill Router dispatches user intents to correct steering files
#
# The POWER.md contains the skill router table. These tests verify that
# an LLM reading the router correctly maps natural-language requests to
# the intended skill and steering file.
#
# Run:  bun run dev eval codeshop

description: "Skill Router dispatches user intents to correct steering files"

prompts:
  - file://dist/kiro/codeshop/POWER.md

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0
    config:
      region: us-east-1
      temperature: 0

tests:
  - description: "TDD trigger routes to drive-tests"
    vars:
      user_query: "Let's do TDD on the payment module"
    assert:
      - type: llm-rubric
        value: >
          Given the POWER.md skill router, the agent should identify
          drive-tests as the correct skill and reference the
          drive-tests.md steering file. PASS if the response clearly
          selects drive-tests/TDD. FAIL if it routes to a different
          skill or is ambiguous.

  - description: "Bug report routes to triage-bug, not journal-debug"
    vars:
      user_query: "Users can't submit forms after the last deploy"
    assert:
      - type: llm-rubric
        value: >
          The agent should route to triage-bug (not journal-debug).
          triage-bug is for reported problems with unknown root cause.
          journal-debug is for active debugging sessions where you're
          already isolating. PASS if triage-bug is selected.
          FAIL if journal-debug or another skill is chosen.

  - description: "Ambiguous 'review' routes to review-changes, not refactor-architecture"
    vars:
      user_query: "Review my PR"
    assert:
      - type: llm-rubric
        value: >
          'Review my PR' should route to review-changes (code review),
          not refactor-architecture (architecture improvement).
          PASS if review-changes is selected. FAIL otherwise.

  - description: "Grill me routes to stress-test-plan"
    vars:
      user_query: "Grill me on this design"
    assert:
      - type: llm-rubric
        value: >
          Should route to stress-test-plan (the grilling skill).
          PASS if stress-test-plan is selected. FAIL otherwise.

  - description: "Domain model trigger is unambiguous"
    vars:
      user_query: "Challenge my domain model"
    assert:
      - type: llm-rubric
        value: >
          Should route to challenge-domain-model.
          PASS if challenge-domain-model is selected. FAIL otherwise.

  - description: "PRD trigger routes to draft-prd"
    vars:
      user_query: "Write a PRD for the notification system"
    assert:
      - type: llm-rubric
        value: >
          Should route to draft-prd. PASS if draft-prd is selected.
          FAIL if it routes to compose-issues or another skill.

  - description: "Issue creation routes to compose-issues"
    vars:
      user_query: "Break this plan into GitHub issues"
    assert:
      - type: llm-rubric
        value: >
          Should route to compose-issues. PASS if compose-issues is
          selected. FAIL if it routes to draft-prd or triage-bug.

  - description: "Debugging session routes to journal-debug"
    vars:
      user_query: "I need to isolate why the cache is returning stale data"
    assert:
      - type: llm-rubric
        value: >
          The user is actively debugging (isolating a known symptom),
          not triaging a report. Should route to journal-debug.
          PASS if journal-debug is selected. FAIL if triage-bug
          or another skill is chosen.

  - description: "Commit message trigger routes to craft-commits"
    vars:
      user_query: "Help me write a good commit message for this change"
    assert:
      - type: llm-rubric
        value: >
          Should route to craft-commits. PASS if craft-commits is
          selected. FAIL otherwise.

  - description: "Architecture review routes to refactor-architecture"
    vars:
      user_query: "This module feels too coupled, can you review the architecture?"
    assert:
      - type: llm-rubric
        value: >
          Should route to refactor-architecture (architecture review),
          not review-changes (PR review) or plan-refactor (refactor
          planning). PASS if refactor-architecture is selected.
          FAIL otherwise.

  - description: "Laconic mode trigger routes to laconic-output"
    vars:
      user_query: "Be brief from now on"
    assert:
      - type: llm-rubric
        value: >
          Should route to laconic-output. PASS if laconic-output is
          selected. FAIL otherwise.

  - description: "Living docs trigger routes to write-living-docs"
    vars:
      user_query: "Audit the docs in this repo and harvest what's missing"
    assert:
      - type: llm-rubric
        value: >
          Should route to write-living-docs. PASS if write-living-docs
          is selected. FAIL otherwise.
