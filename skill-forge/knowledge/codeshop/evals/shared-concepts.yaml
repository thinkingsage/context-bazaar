# Eval: Shared concepts are applied consistently across skills
#
# Codeshop defines cross-cutting concepts (vertical slices, deep modules,
# durable issues, domain language discipline) in POWER.md. Skills that
# reference these concepts should apply them correctly.
#
# Run:  bun run dev eval codeshop

description: "Shared concepts are applied consistently across skills"

prompts:
  - file://dist/kiro/codeshop/steering/drive-tests.md
  - file://dist/kiro/codeshop/steering/compose-issues.md
  - file://dist/kiro/codeshop/steering/triage-bug.md

providers:
  - id: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0
    config:
      region: us-east-1
      temperature: 0

defaultTest:
  options:
    provider: bedrock:us.anthropic.claude-sonnet-4-20250514-v1:0

tests:
  - description: "Vertical slices concept is referenced where expected"
    assert:
      - type: llm-rubric
        value: >
          These steering files should reference or apply the concept
          of vertical slices / tracer bullets when breaking work into
          units. PASS if the guidance encourages slicing vertically
          (end-to-end through layers) rather than horizontally
          (one layer at a time). FAIL if it encourages horizontal
          layering or doesn't address slicing strategy at all.

  - description: "Durable issues concept is applied in issue-filing skills"
    assert:
      - type: llm-rubric
        value: >
          Skills that file GitHub issues should produce durable issues
          — describing behaviors and interfaces, not file paths or
          line numbers. PASS if the guidance explicitly steers toward
          behavior-based descriptions. FAIL if it encourages
          referencing specific file paths or line numbers.

  - description: "Agent brief format is used for GitHub issues"
    assert:
      - type: llm-rubric
        value: >
          Skills that create GitHub issues should use or reference the
          Agent Brief format — a structured comment with Category,
          Summary, Current/Desired behavior, Key interfaces, Acceptance
          criteria, and Out of scope sections. PASS if the guidance
          references this format or produces structurally equivalent
          output. FAIL if issues are filed as unstructured prose.
