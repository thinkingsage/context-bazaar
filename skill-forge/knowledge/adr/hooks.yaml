- name: ADR Reminder
  description: >-
    When an agent session ends, analyzes git diff for architectural changes
    (filtering out tests/specs), shows only relevant spec design decisions
    from specs whose files were touched, and cross-references against recent
    ADRs. Exits silently if only non-architectural files changed.
  event: agent_stop
  action:
    type: run_command
    command: >-
      bash -c 'DIFF=$(git diff --stat HEAD 2>/dev/null);
      if [ -z "$DIFF" ]; then exit 0; fi;
      ARCH_FILES=$(echo "$DIFF" | grep -iE "src/|lib/|commands/|modules/" | grep -viE "test|spec|__test|__spec|\.test\.|\.spec\." || true);
      ARCH_COUNT=$(echo "$ARCH_FILES" | grep -c . 2>/dev/null || true);
      if [ "$ARCH_COUNT" -lt 1 ]; then exit 0; fi;
      echo "ADR reminder: $ARCH_COUNT architectural file(s) changed.";
      echo "$ARCH_FILES" | sed "s/^/  /" | head -15;
      echo; echo "Recent ADRs:";
      for d in docs/adr docs/decisions docs/architecture/decisions; do
      if [ -d "$d" ]; then ls "$d"/0*.md 2>/dev/null | tail -5 |
      while read f; do head -1 "$f" | sed "s/^# //"; done; break; fi; done;
      echo; CHANGED_DIRS=$(echo "$DIFF" | sed "s|^[[:space:]]*||" | cut -d/ -f1-3 | sort -u);
      for d in .kiro/specs/*/design.md; do if [ -f "$d" ]; then
      SPEC=$(dirname "$d" | xargs basename); SPEC_KEBAB=$(echo "$SPEC" | tr "_" "-");
      if echo "$CHANGED_DIRS" | grep -qi "$SPEC_KEBAB"; then
      echo "--- $SPEC ---";
      grep -iE "(key design decision|design decision|trade.?off|rationale)" "$d" 2>/dev/null | head -8;
      fi; fi; done;
      echo; echo "Cross-reference against existing ADRs. Flag undocumented choices."; '

- name: ADR + Spec Context Check
  description: >-
    Before starting a spec task, reminds the agent to review existing ADRs
    and the current spec's design decisions so architectural context is
    front-of-mind during implementation.
  event: pre_task
  action:
    type: ask_agent
    prompt: >-
      Before starting this task, review the active spec's design.md for key
      design decisions and cross-reference them against existing ADRs in the
      project's ADR directory. Keep these architectural constraints in mind
      during implementation. If the task introduces new architectural choices
      not covered by an existing ADR, flag it for the user.
