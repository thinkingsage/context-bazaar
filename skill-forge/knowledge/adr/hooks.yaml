- name: ADR Reminder
  description: >-
    When an agent session ends, checks git diff for changes to architectural
    file types and reminds you to create an ADR if any are detected.
  event: agent_stop
  action:
    type: run_command
    command: >-
      bash -c 'DIFF=$(git diff --stat HEAD 2>/dev/null);
      if echo "$DIFF" | grep -qiE "\.(ts|json|yaml|yml|njk)|schema|config|module|adapter";
      then echo "ADR reminder: architectural changes detected this session.
      Consider creating an ADR to capture any decisions worth documenting."; fi'

- name: ADR Pre-Task Review
  description: >-
    Before starting a spec task, lists any existing ADRs so the agent
    can consider prior architectural decisions.
  event: pre_task
  action:
    type: run_command
    command: >-
      bash -c 'for d in docs/adr docs/decisions docs/architecture/decisions;
      do if [ -d "$d" ]; then echo "Existing ADRs in $d/:";
      ls "$d"/*.md 2>/dev/null; exit 0; fi; done'

- name: Post-Task ADR Check
  description: >-
    After completing a spec task, shows git diff stats so the agent can
    assess architectural significance.
  event: post_task
  action:
    type: run_command
    command: >-
      bash -c 'echo "=== Post-task diff ===";
      git diff --stat HEAD 2>/dev/null || echo "No git changes detected"'
